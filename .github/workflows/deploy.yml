name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/linkedin-msg

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Navigate to deploy directory
            cd ${{ env.DEPLOY_PATH }}

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Always refresh .env from secrets to avoid stale values on VPS
            cat > .env << 'EOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            PORT=3001
            EOF

            # Fail fast if required values are missing
            if grep -q '^JWT_SECRET=$' .env || grep -q '^MONGODB_URI=$' .env; then
              echo "Missing required secrets: JWT_SECRET and/or MONGODB_URI"
              exit 1
            fi

            # Update nginx config if changed
            if [ -f nginx/linkedin.tuetran.dev.conf ]; then
              sudo cp nginx/linkedin.tuetran.dev.conf /etc/nginx/sites-available/linkedin.tuetran.dev
              sudo ln -sf /etc/nginx/sites-available/linkedin.tuetran.dev /etc/nginx/sites-enabled/
              sudo nginx -t && sudo systemctl reload nginx
            fi

            # Build and deploy with docker compose
            docker compose -f docker-compose.prod.yml config
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f

            # Show status
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=200 backend

  setup:
    name: Initial Server Setup
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Setup VPS (first time only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
              rm get-docker.sh
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &> /dev/null; then
              echo "Installing Docker Compose plugin..."
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi

            # Create deploy directory
            sudo mkdir -p ${{ env.DEPLOY_PATH }}
            sudo chown $USER:$USER ${{ env.DEPLOY_PATH }}

            # Clone repository if not exists
            if [ ! -d "${{ env.DEPLOY_PATH }}/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git ${{ env.DEPLOY_PATH }}
            fi

            echo "Server setup complete!"
