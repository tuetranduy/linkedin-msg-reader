services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-msg-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - linkedin-msg-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: linkedin-msg-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
    volumes:
      - linkedin-msg-data:/app/data
    restart: unless-stopped
    networks:
      - linkedin-msg-network

volumes:
  linkedin-msg-data:

networks:
  linkedin-msg-network:
    driver: bridge
