services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-msg-frontend
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - linkedin-msg-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: linkedin-msg-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');http.get('http://127.0.0.1:3001/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    volumes:
      - linkedin-msg-data:/app/data
    restart: unless-stopped
    networks:
      - linkedin-msg-network

volumes:
  linkedin-msg-data:

networks:
  linkedin-msg-network:
    driver: bridge
